name: showcase-project

services:
  core-platform:
    build:
      context: ./core-platform
      dockerfile: Dockerfile
    container_name: core-platform
    env_file:
      - .env
      - ./envs/core-platform/.env
    ports:
      - "${CORE_PLATFORM_PORT:-8001}:8001"
    networks:
      - showcase_net
    volumes:
      - core_platform_data:/app/data
      - core_platform_logs:/app/logs

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    env_file:
      - .env
      - ./envs/ai-service/.env
    ports:
      - "${AI_SERVICE_PORT:-8002}:8002"
    networks:
      - showcase_net
    volumes:
      - ai_service_models:/app/models
      - ai_service_cache:/app/cache
    # Optional GPU enablement (sample):
    # Enable when deploying on a GPU-capable host.
    # gpus: all

  ops-api:
    build:
      context: ./ops-api
      dockerfile: Dockerfile
    container_name: ops-api
    env_file:
      - .env
      - ./envs/ops-api/.env
    ports:
      - "${OPS_API_PORT:-8003}:8003"
    networks:
      - showcase_net

  ops-frontend:
    build:
      context: ./ops-frontend
      dockerfile: Dockerfile
    container_name: ops-frontend
    env_file:
      - .env
      - ./envs/ops-frontend/.env
    ports:
      - "${OPS_FRONTEND_PORT:-3000}:3000"
    depends_on:
      - ops-api
    networks:
      - showcase_net

volumes:
  core_platform_data:
  core_platform_logs:
  ai_service_models:
  ai_service_cache:

networks:
  showcase_net:
    driver: bridge
