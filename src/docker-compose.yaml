name: showcase-project

# Profiles:
#   default  — production-like deployment
#   dev      — development with hot-reload (add --profile dev)

services:
  redis:
    image: redis:7-alpine
    container_name: showcase-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - showcase_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: showcase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-showcase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-showcase_secret}
      POSTGRES_DB: ${POSTGRES_DB:-showcase}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - showcase_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-showcase} -d ${POSTGRES_DB:-showcase}"]
      interval: 5s
      timeout: 3s
      retries: 5

  core-platform:
    build:
      context: ./core-platform
      dockerfile: Dockerfile
    container_name: core-platform
    env_file:
      - .env
      - ./envs/core-platform/.env
    ports:
      - "${CORE_PLATFORM_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - showcase_net
    volumes:
      - core_platform_data:/app/data
      - core_platform_logs:/app/logs

  ai-service:
    build:
      context: .
      dockerfile: ./ai-service/Dockerfile
    container_name: ai-service
    env_file:
      - .env
      - ./envs/ai-service/.env
    ports:
      - "${AI_SERVICE_PORT:-8002}:8002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - showcase_net
    volumes:
      - ai_service_models:/app/models
      - ai_service_cache:/app/cache

  ops-api:
    build:
      context: .
      dockerfile: ./ops-api/Dockerfile
    container_name: ops-api
    env_file:
      - .env
      - ./envs/ops-api/.env
    ports:
      - "${OPS_API_PORT:-8003}:8003"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - showcase_net
    volumes:
      - ./ops-api/app:/app/ops-api/app
    # Dev: remove the command override below to use production CMD from Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload

  ai-agent:
    build:
      context: .
      dockerfile: ./ai-agent/Dockerfile
    container_name: ai-agent
    env_file:
      - .env
      - ./envs/ai-agent/.env
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OPS_API_URL=http://ops-api:8003
      - LLM_MODEL=qwen3:14b
    ports:
      - "${AI_AGENT_PORT:-8004}:8004"
    depends_on:
      - ops-api
    networks:
      - showcase_net
    volumes:
      - ./ai-agent/app:/app/ai-agent/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload

  ops-frontend:
    build:
      context: ./ops-frontend
      dockerfile: Dockerfile
    container_name: ops-frontend
    env_file:
      - .env
      - ./envs/ops-frontend/.env
    ports:
      - "${OPS_FRONTEND_PORT:-3000}:80"
    depends_on:
      - ops-api
    networks:
      - showcase_net

  edge-sim:
    build:
      context: .
      dockerfile: ./edge-sim/Dockerfile
    container_name: edge-sim
    env_file:
      - .env
      - ./envs/edge-sim/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${EDGE_SIM_PORT:-8005}:8005"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - showcase_net
    volumes:
      - ./edge-sim/app:/app/edge-sim/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload

  ops-frontend-dev:
    profiles: ["dev"]
    image: node:22-alpine
    container_name: ops-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
      - ./envs/ops-frontend/.env
    ports:
      - "5173:3000"
    depends_on:
      - ops-api
    networks:
      - showcase_net
    volumes:
      - ./ops-frontend/package.json:/app/package.json
      - ./ops-frontend/tsconfig.json:/app/tsconfig.json
      - ./ops-frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./ops-frontend/vite.config.ts:/app/vite.config.ts
      - ./ops-frontend/index.html:/app/index.html
      - ./ops-frontend/src:/app/src
      - ./ops-frontend/public:/app/public

volumes:
  redis_data:
  postgres_data:
  core_platform_data:
  core_platform_logs:
  ai_service_models:
  ai_service_cache:

networks:
  showcase_net:
    driver: bridge
