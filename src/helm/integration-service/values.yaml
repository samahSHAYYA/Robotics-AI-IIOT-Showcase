replicaCount: 2

image:
  repository: showcase/integration-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8006

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://ops-api:8003/api/v1/auth/verify"
  hosts:
    - host: integrations.showcase.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  SERVICE_PORT: "8006"
  LOG_LEVEL: "INFO"
  JWT_SECRET:
    valueFrom:
      secretKeyRef:
        name: showcase-secrets
        key: jwt-secret
  DATABASE_URL:
    valueFrom:
      secretKeyRef:
        name: showcase-secrets
        key: database-url
  REDIS_URL:
    valueFrom:
      secretKeyRef:
        name: showcase-secrets
        key: redis-url

livenessProbe:
  httpGet:
    path: /health
    port: 8006
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 8006
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true

nodeSelector: {}
tolerations: []
affinity: {}
