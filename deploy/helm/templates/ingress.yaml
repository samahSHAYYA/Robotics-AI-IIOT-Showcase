apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-factory-ingress
  labels:
    {{- include "smart-factory.labels" . | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ops-api
            port:
              number: {{ .Values.opsApi.port }}
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: ops-api
            port:
              number: {{ .Values.opsApi.port }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ops-frontend
            port:
              number: {{ .Values.opsFrontend.port }}
