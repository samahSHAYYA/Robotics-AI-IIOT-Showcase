global:
  environment: production
  imageTag: latest

opsFrontend:
  image: ops-frontend
  replicas: 1
  port: 5173

opsApi:
  image: ops-api
  replicas: 2
  port: 8003
  env:
    REDIS_URL: redis://redis:6379/0
    POSTGRES_HOST: postgres
    POSTGRES_DB: factory
    FRONTEND_ORIGIN: http://localhost:5173

aiService:
  image: ai-service
  replicas: 1
  port: 8002
  env:
    REDIS_URL: redis://redis:6379/0

aiAgent:
  image: ai-agent
  replicas: 1
  port: 8004
  env:
    REDIS_URL: redis://redis:6379/0

redis:
  image: redis:7-alpine
  port: 6379

postgres:
  image: postgres:16-alpine
  port: 5432
  env:
    POSTGRES_DB: factory
    POSTGRES_USER: factory
    POSTGRES_PASSWORD: factory
